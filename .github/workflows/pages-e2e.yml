name: Pages E2E

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: '17 3 * * *'

jobs:
  pages-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run unit tests
        run: npm test

      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Wait for Pages deployment to settle
        run: sleep 30

      - name: Run deployed Pages E2E
        env:
          E2E_BASE_URL: https://setapolo.github.io/forthsandbox/
        run: npx playwright test
